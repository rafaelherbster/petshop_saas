{% extends 'base.html' %}

{% block title %}Senha Alterada - PetShop Pro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pb-16">
    <div class="w-full max-w-sm">
        <div class="bg-green-50 border border-green-200 rounded-xl p-6 text-center">
            <svg class="w-12 h-12 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h2 class="text-lg font-semibold text-green-800 mb-2">Senha alterada!</h2>
            <p class="text-green-700 text-sm">Sua senha foi alterada com sucesso. Você já pode fazer login com a nova senha.</p>
            <a href="{% url 'login' %}" class="inline-block mt-4 bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 transition">Fazer Login</a>
        </div>
    </div>
</div>
{% endblock %}
