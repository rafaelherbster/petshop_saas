{% extends 'base.html' %}

{% block title %}Cadastro - PetShop Pro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pb-16">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">🐾 PetShop Pro</h1>
            <p class="text-gray-500 mt-2">Crie sua conta gratuitamente</p>
        </div>
        <form method="post" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Digite um email válido" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="seu@email.com">
            </div>
            <div class="mt-4">
                <label class="block text-sm font-medium mb-2">Senha *</label>
                <input type="password" name="password" required minlength="6" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm font-medium mb-2">Confirmar Senha *</label>
                <input type="password" name="confirm_password" required minlength="6" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm font-medium mb-2">Nome do Pet Shop</label>
                <input type="text" name="shop_name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm font-medium mb-2">Telefone do Pet Shop</label>
                <input type="text" name="shop_phone" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            {% if error %}
            <p class="mt-4 text-sm text-red-600">{{ error }}</p>
            {% endif %}
            <button type="submit" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition active:scale-95">
                Criar Conta
            </button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-500">
            Já tem conta? <a href="{% url 'login'  %}" class="text-blue-600 font-medium">Entrar</a>
        </p>
    </div>
</div>
{% endblock %}
