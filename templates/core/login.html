{% extends 'base.html' %}

{% block title %}Login - PetShop Pro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pb-16">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">🐾 PetShop Pro</h1>
            <p class="text-gray-500 mt-2">Gerencie seu pet shop com facilidade</p>
        </div>
        <form method="post" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mt-4">
                <label class="block text-sm font-medium mb-2">Senha</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            {% if error %}
            <p class="mt-4 text-sm text-red-600">{{ error }}</p>
            {% endif %}
            <button type="submit" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition active:scale-95">
                Entrar
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="{% url 'password_reset' %}" class="text-sm text-gray-500 hover:text-blue-600">
                Esqueceu sua senha?
            </a>
        </div>
        <p class="text-center mt-4 text-sm text-gray-500">
            Novo no PetShop Pro? <a href="{% url 'register' %}" class="text-blue-600 font-medium">Cadastre-se</a>
        </p>
    </div>
</div>
{% endblock %}
