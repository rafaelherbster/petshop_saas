{% extends 'base.html' %}

{% block title %}Email Enviado - PetShop Pro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pb-16">
    <div class="w-full max-w-sm">
        <div class="bg-green-50 border border-green-200 rounded-xl p-6 text-center">
            <svg class="w-12 h-12 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            <h2 class="text-lg font-semibold text-green-800 mb-2">Verifique seu email</h2>
            <p class="text-green-700 text-sm">Enviamos um email com instruções para criar uma nova senha.</p>
        </div>
        <p class="text-center mt-4 text-sm text-gray-500">
            Não recebeu? <a href="{% url 'password_reset' %}" class="text-blue-600 font-medium">Tentar novamente</a>
        </p>
    </div>
</div>
{% endblock %}
