{% extends 'base.html' %}

{% block title %}Cancelar Agendamento{% endblock %}

{% block content %}
<div class="mx-auto max-w-md px-4 md:px-0 pt-8">
    <div class="bg-white p-6 rounded-xl border border-gray-200">
        <h1 class="text-xl font-bold text-red-600">Cancelar Agendamento</h1>
        <p class="mt-2 text-gray-600">Tem certeza que deseja cancelar o agendamento de <strong>{{ appointment.pet.name }}</strong>?</p>
        <form method="post" class="mt-6 flex gap-3">
            {% csrf_token %}
            <button type="submit" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-medium hover:bg-red-700 active:scale-95">Cancelar Agendamento</button>
            <a href="{% url 'appointment_detail' slug=pet_shop.slug pk=appointment.pk %}" class="flex-1 text-center bg-gray-100 py-3 rounded-lg font-medium hover:bg-gray-200 active:scale-95">Voltar</a>
        </form>
    </div>
</div>
{% endblock %}
