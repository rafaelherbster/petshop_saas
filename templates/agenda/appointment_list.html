{% extends 'base.html' %}

{% block title %}Agenda{% endblock %}

{% block content %}
<div class="mx-auto max-w-4xl">
    <div class="flex items-center justify-between px-4 md:px-0 pt-4 md:pt-0">
        <h1 class="text-2xl font-bold">Agenda</h1>
        <a href="{% url 'appointment_create' slug=pet_shop.slug %}" class="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-medium text-sm hover:bg-blue-700 active:scale-95">+ Novo</a>
    </div>

    <!-- Date navigation -->
    <div class="flex items-center justify-between px-4 md:px-0 mt-4">
        <a href="?date={{ prev_date|date:'Y-m-d' }}" class="px-3 py-2 text-sm bg-white rounded-lg border border-gray-200 hover:bg-gray-50 active:scale-95">
            ← Anterior
        </a>
        <div class="text-center">
            <p class="font-medium">{{ date|date:"l" }}</p>
            <p class="text-sm text-gray-500">{{ date|date:"d/m/Y" }}</p>
        </div>
        <a href="?date={{ next_date|date:'Y-m-d' }}" class="px-3 py-2 text-sm bg-white rounded-lg border border-gray-200 hover:bg-gray-50 active:scale-95">
            Próximo →
        </a>
    </div>

    <div id="appointment-list" class="px-4 md:px-0 mt-4 space-y-2 pb-4">
        {% include 'agenda/partials/appointment_list.html' %}
    </div>
</div>
{% endblock %}
