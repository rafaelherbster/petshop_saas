{% for tutor in tutors %}
<div class="bg-white p-4 rounded-xl border border-gray-200">
    <div class="flex items-center justify-between">
        <a href="{% url 'tutor_detail' slug=pet_shop.slug pk=tutor.pk %}" class="flex items-center gap-3 flex-1 min-w-0">
            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-sm shrink-0">
                {{ tutor.name|first|upper }}
            </div>
            <div class="min-w-0">
                <p class="font-medium truncate">{{ tutor.name }}</p>
                <p class="text-sm text-gray-500">{{ tutor.phone }} {{ tutor.email|truncatechars:30 }}</p>
            </div>
        </a>
        <span class="text-xs text-gray-400 shrink-0 ml-2">{{ tutor.pets.count }} pet{{ tutor.pets.count|pluralize }}</span>
    </div>
</div>
{% empty %}
<div class="bg-white p-8 rounded-xl border border-gray-200 text-center">
    <p class="text-gray-400">Nenhum tutor encontrado</p>
</div>
{% endfor %}
