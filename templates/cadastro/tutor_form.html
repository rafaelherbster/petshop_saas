{% extends 'base.html' %}

{% block title %}Novo Tutor{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 md:px-0 pt-4 md:pt-6">
    <h1 class="text-2xl font-bold mb-6">Novo Tutor</h1>
    <form method="post" class="bg-white p-6 rounded-xl border border-gray-200 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1">Nome *</label>
            <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Telefone *</label>
            <input type="text" name="phone" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">CPF</label>
                <input type="text" name="cpf" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Endere\xE7o</label>
            <input type="text" name="address" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Observa\xE7\xF5es</label>
            <textarea name="notes" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 active:scale-95">Salvar</button>
            <a href="{% url 'tutor_list' slug=pet_shop.slug %}" class="flex-1 text-center bg-gray-100 py-3 rounded-lg font-medium hover:bg-gray-200 active:scale-95">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
