{% extends 'base.html' %}

{% block title %}Novo Pet{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 md:px-0 pt-4 md:pt-6 pb-24">
    <h1 class="text-2xl font-bold mb-6">Novo Pet</h1>
    <form method="post" enctype="multipart/form-data" class="bg-white p-6 rounded-xl border border-gray-200 space-y-4">
        {% csrf_token %}
        {% if tutors|length == 1 %}
            <input type="hidden" name="tutor" value="{{ tutors.0.pk }}">
            <p class="text-sm text-gray-500">Tutor: {{ tutors.0.name }}</p>
        {% else %}
        <div>
            <label class="block text-sm font-medium mb-1">Tutor *</label>
            <select name="tutor" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
                <option value="">Selecione o tutor</option>
                {% for tutor in tutors %}
                <option value="{{ tutor.pk }}">{{ tutor.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div>
            <label class="block text-sm font-medium mb-1">Nome do Pet *</label>
            <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Espécie *</label>
                <select name="species" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
                    <option value="dog">Cachorro</option>
                    <option value="cat">Gato</option>
                    <option value="bird">Pássaro</option>
                    <option value="rabbit">Coelho</option>
                    <option value="hamster">Hamster</option>
                    <option value="other">Outro</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Porte</label>
                <select name="size" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
                    <option value="">Selecione</option>
                    <option value="small">Pequeno</option>
                    <option value="medium">Médio</option>
                    <option value="large">Grande</option>
                    <option value="giant">Gigante</option>
                </select>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Raça</label>
                <input type="text" name="breed" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Sexo *</label>
                <select name="gender" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
                    <option value="M">Macho</option>
                    <option value="F">Fêmea</option>
                </select>
            </div>
        </div>
        <div><label class="block text-sm font-medium mb-1">Data de Nascimento</label><input type="date" name="birth_date" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium mb-1">Cor</label><input type="text" name="color" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium mb-1">Foto</label><input type="file" name="photo" accept="image/*" class="w-full px-4 py-3 rounded-lg border border-gray-300"></div>
        <div><label class="block text-sm font-medium mb-1">Observações</label><textarea name="notes" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500"></textarea></div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 active:scale-95">Salvar</button>
            <a href="javascript:history.back()" class="flex-1 text-center bg-gray-100 py-3 rounded-lg font-medium hover:bg-gray-200 active:scale-95">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
