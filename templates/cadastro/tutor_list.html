{% extends 'base.html' %}

{% block title %}Tutores{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl">
    <div class="flex items-center justify-between px-4 md:px-0 pt-4 md:pt-0">
        <h1 class="text-2xl font-bold">Tutores</h1>
        <a href="{% url 'tutor_create' slug=pet_shop.slug %}" class="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-medium text-sm hover:bg-blue-700 active:scale-95">
            + Novo
        </a>
    </div>

    <div class="px-4 md:px-0 mt-4">
        <form hx-get="{% url 'tutor_list' slug=pet_shop.slug %}" hx-target="#tutor-list" hx-trigger="input changed delay:300ms">
            <input type="search" name="q" value="{{ query }}" placeholder="Buscar por nome, telefone..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
        </form>
    </div>

    <div id="tutor-list" class="px-4 md:px-0 mt-4 space-y-2 pb-4">
        {% include 'cadastro/partials/tutor_list.html' %}
    </div>
</div>
{% endblock %}
