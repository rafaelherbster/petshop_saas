{% extends 'base.html' %}

{% block title %}Registrar Pagamento{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 md:px-0 pt-4 md:pt-6">
    <h1 class="text-2xl font-bold mb-6">Registrar Pagamento</h1>
    <div class="bg-white p-4 rounded-xl border border-gray-200 mb-4">
        <p class="font-medium">{{ appointment.pet.name }} — {{ appointment.service.name }}</p>
        <p class="text-sm text-gray-500">{{ appointment.date|date:"d/m/Y" }} às {{ appointment.time|time:"H:i" }}</p>
    </div>
    <form method="post" class="bg-white p-6 rounded-xl border border-gray-200 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1">Valor (R$)</label>
            <input type="number" name="amount" step="0.01" min="0" value="{{ default_amount }}" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Método</label>
            <select name="method" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500">
                <option value="pix">PIX</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="cartao_credito">Cartão Crédito</option>
                <option value="cartao_debito">Cartão Débito</option>
            </select>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 active:scale-95">Confirmar Pagamento</button>
            <a href="{% url 'appointment_detail' slug=pet_shop.slug pk=appointment.pk %}" class="flex-1 text-center bg-gray-100 py-3 rounded-lg font-medium hover:bg-gray-200 active:scale-95">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
